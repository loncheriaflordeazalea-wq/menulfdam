<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lonchería Flor de Azalea – Matriz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --azul: #1a237e;
    --rojo: #e53935;
    --amarillo: #ffd600;
    --blanco: #fff;
    --gris: #f5f5f5;
    --sombra: rgba(26,35,126,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--gris); color: #222; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--azul);
    color: var(--blanco);
    padding: 18px 20px 14px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 3px 12px var(--sombra);
  }
  .logo-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--amarillo);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: 22px; color: var(--azul); flex-shrink: 0;
    border: 3px solid var(--rojo);
  }
  .header-info h1 { font-family: 'Bebas Neue', cursive; font-size: 1.7rem; letter-spacing: 1px; line-height: 1; }
  .header-info p { font-size: 0.78rem; opacity: 0.8; }
  .header-badge {
    margin-left: auto;
    background: var(--rojo);
    color: var(--blanco);
    font-size: 0.7rem; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap;
  }

  /* BANNER */
  .banner {
    background: var(--rojo);
    color: var(--blanco);
    text-align: center;
    padding: 10px 16px;
    font-size: 0.82rem; font-weight: 700;
    letter-spacing: 0.5px;
  }
  .banner span { color: var(--amarillo); }

  /* LOADING */
  #loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; gap: 16px;
  }
  .spinner {
    width: 44px; height: 44px; border-radius: 50%;
    border: 4px solid var(--amarillo);
    border-top-color: var(--azul);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--azul); font-weight: 700; }

  /* CATEGORÍAS */
  #menu { padding: 16px; max-width: 700px; margin: 0 auto; }

  .cat-block { margin-bottom: 18px; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 10px var(--sombra); }
  .cat-header {
    background: var(--azul);
    color: var(--blanco);
    padding: 11px 16px;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.1rem; letter-spacing: 1px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
  }
  .cat-header .cat-icon { font-size: 1.2rem; }
  .cat-header .cat-arrow { margin-left: auto; transition: transform 0.25s; }
  .cat-header.open .cat-arrow { transform: rotate(180deg); }
  .cat-body { background: var(--blanco); display: none; }
  .cat-body.open { display: block; }

  .item-row {
    display: flex; align-items: center;
    padding: 11px 14px;
    border-bottom: 1px solid #f0f0f0;
    gap: 10px; cursor: grab;
    transition: background 0.15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:active { cursor: grabbing; background: #fff8e1; }
  .item-row.dragging { opacity: 0.5; background: #e8eaf6; }
  .item-row.drag-over { background: #fff9c4; border-top: 2px dashed var(--amarillo); }

  .drag-handle { color: #bbb; font-size: 1.1rem; flex-shrink: 0; }
  .item-name { flex: 1; font-weight: 700; font-size: 0.95rem; }
  .item-desc { font-size: 0.75rem; color: #888; font-weight: 400; margin-top: 1px; }
  .item-precio { font-weight: 800; color: var(--rojo); font-size: 1rem; white-space: nowrap; flex-shrink: 0; }
  .item-precio span { font-size: 0.7rem; font-weight: 600; color: #aaa; }

  .btn-add {
    background: var(--azul);
    color: var(--blanco);
    border: none; border-radius: 20px;
    padding: 5px 12px; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-add:hover { background: var(--rojo); }
  .btn-add:active { transform: scale(0.95); }
  .btn-add.added { background: #43a047; }

  /* CARRITO FLOTANTE */
  #cart-fab {
    position: fixed; bottom: 80px; right: 18px;
    background: var(--rojo); color: var(--blanco);
    width: 58px; height: 58px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; cursor: pointer;
    box-shadow: 0 4px 18px rgba(229,57,53,0.45);
    z-index: 200; transition: transform 0.2s;
    display: none;
  }
  #cart-fab:hover { transform: scale(1.08); }
  #cart-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--amarillo); color: var(--azul);
    font-size: 0.7rem; font-weight: 800;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* PANEL PEDIDO */
  #order-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--blanco);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
    z-index: 300; padding: 20px 18px 30px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    max-height: 80vh; overflow-y: auto;
  }
  #order-panel.open { transform: translateY(0); }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .panel-header h2 { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; color: var(--azul); }
  .panel-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888; }

  #order-list { list-style: none; margin-bottom: 16px; }
  #order-list li {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid #f0f0f0;
    font-size: 0.9rem; cursor: grab;
  }
  #order-list li:last-child { border-bottom: none; }
  #order-list li:active { cursor: grabbing; }
  .order-drag { color: #ccc; }
  .order-name { flex: 1; font-weight: 700; }
  .order-qty { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    background: var(--azul); color: var(--blanco);
    border: none; border-radius: 50%;
    width: 24px; height: 24px; font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-weight: 700; line-height: 1;
  }
  .qty-btn.minus { background: #ef9a9a; color: #b71c1c; }
  .qty-num { font-weight: 800; min-width: 18px; text-align: center; }
  .order-precio { font-weight: 800; color: var(--rojo); font-size: 0.9rem; }
  .order-remove { background: none; border: none; color: #ccc; font-size: 1rem; cursor: pointer; }
  .order-remove:hover { color: var(--rojo); }

  .order-note {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid #e0e0e0; border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-size: 0.88rem;
    margin-bottom: 14px; resize: none;
  }
  .order-note:focus { outline: none; border-color: var(--azul); }

  .order-total {
    display: flex; justify-content: space-between; align-items: center;
    font-weight: 800; font-size: 1.05rem;
    padding: 10px 0; border-top: 2px solid var(--amarillo);
    margin-bottom: 14px; color: var(--azul);
  }
  .order-total span { color: var(--rojo); font-size: 1.2rem; }

  .btn-wa {
    width: 100%; padding: 14px;
    background: #25D366; color: var(--blanco);
    border: none; border-radius: 12px;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.2rem; letter-spacing: 1px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 10px;
  }
  .btn-wa:hover { background: #128C7E; }
  .btn-wa:active { transform: scale(0.98); }

  .btn-cuenta {
    width: 100%; padding: 11px;
    background: var(--azul); color: var(--blanco);
    border: none; border-radius: 12px;
    font-family: 'Bebas Neue', cursive;
    font-size: 1rem; letter-spacing: 1px;
    cursor: pointer; transition: background 0.2s;
    margin-bottom: 8px;
  }
  .btn-cuenta:hover { background: var(--rojo); }

  .btn-opinion {
    width: 100%; padding: 11px;
    background: var(--amarillo); color: var(--azul);
    border: none; border-radius: 12px;
    font-family: 'Bebas Neue', cursive;
    font-size: 1rem; letter-spacing: 1px;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-opinion:hover { background: #f9a825; }

  /* EMPTY STATE */
  .order-empty { text-align: center; padding: 24px 0; color: #bbb; }
  .order-empty div { font-size: 2.5rem; margin-bottom: 8px; }

  /* OVERLAY */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 250; display: none;
  }
  #overlay.open { display: block; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--azul);
    display: flex; align-items: center; justify-content: space-around;
    padding: 10px 0 14px; z-index: 150;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: rgba(255,255,255,0.6); cursor: pointer;
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    background: none; border: none;
    transition: color 0.2s;
  }
  .nav-btn .nav-icon { font-size: 1.3rem; }
  .nav-btn:hover, .nav-btn.active { color: var(--amarillo); }

  /* Arrastrar en lista de pedido */
  #order-list li.dragging { opacity: 0.4; }
  #order-list li.drag-over { border-top: 2px dashed var(--rojo); }

  @media (min-width: 600px) {
    #menu { padding: 20px; }
    .item-row { padding: 13px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-circle">FA</div>
  <div class="header-info">
    <h1>Flor de Azalea</h1>
    <p>Lonchería desde 1997 · Matriz</p>
  </div>
  <div class="header-badge" id="horario-badge">Cargando…</div>
</header>

<div class="banner">
  🌸 Arrastra los productos a tu pedido · <span>¡Desde 1997 con sabor!</span>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Cargando menú…</p>
</div>

<div id="menu"></div>

<div id="cart-fab" onclick="openPanel()">
  🛒
  <div id="cart-badge">0</div>
</div>

<div id="overlay" onclick="closePanel()"></div>

<div id="order-panel">
  <div class="panel-header">
    <h2>📋 Tu Pedido</h2>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <ul id="order-list"></ul>
  <textarea class="order-note" id="order-note" rows="2" placeholder="¿Alguna indicación? (sin cebolla, extra salsa…)"></textarea>
  <div class="order-total">
    <span>Total estimado</span>
    <span id="order-total-val">$0</span>
  </div>
  <button class="btn-wa" onclick="sendWhatsApp()">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="white"><path d="M16 3C8.82 3 3 8.82 3 16c0 2.39.63 4.63 1.74 6.57L3 29l6.57-1.72A12.93 12.93 0 0016 29c7.18 0 13-5.82 13-13S23.18 3 16 3zm6.45 18.12c-.27.76-1.57 1.46-2.15 1.55-.55.08-1.25.12-2.01-.13-.46-.15-1.06-.35-1.82-.69-3.2-1.38-5.29-4.6-5.45-4.81-.16-.21-1.3-1.73-1.3-3.3s.82-2.34 1.11-2.66c.27-.3.59-.38.79-.38l.57.01c.18 0 .43-.07.67.51.27.64.9 2.2.98 2.36.08.16.13.35.03.56-.1.21-.16.34-.31.52-.16.18-.33.4-.47.54-.16.16-.32.33-.14.65.19.32.82 1.35 1.76 2.18 1.21 1.08 2.23 1.41 2.55 1.57.32.16.51.13.7-.08.19-.21.8-.93 1.01-1.25.21-.32.43-.27.72-.16.29.11 1.84.87 2.16 1.02.32.16.53.24.61.37.08.14.08.77-.19 1.52z"/></svg>
    Enviar Pedido por WhatsApp
  </button>
  <button class="btn-cuenta" onclick="pedirCuenta()">🧾 Solicitar Cuenta / Atención</button>
  <button class="btn-opinion" onclick="dejarOpinion()">⭐ Dejar Opinión</button>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="scrollTop()">
    <span class="nav-icon">🏠</span>Menú
  </button>
  <button class="nav-btn" onclick="openPanel()">
    <span class="nav-icon">🛒</span>Pedido
  </button>
  <button class="nav-btn" onclick="pedirCuenta()">
    <span class="nav-icon">🧾</span>Cuenta
  </button>
  <button class="nav-btn" onclick="dejarOpinion()">
    <span class="nav-icon">⭐</span>Opinión
  </button>
</nav>

<script>
const API = "https://script.google.com/macros/s/AKfycbxrPQgFJJbnDLKAGDLZUmNIC3W6-jniImIrbL8x3iBkM0IodIdC44KdKfrruAaQccrlkQ/exec";
const SUCURSAL = "LFDA_MATRIZ";

let config = {};
let orden = []; // [{nombre, precio, qty, categoria}]

const CAT_ICONS = {
  "TORTAS / TOSTADAS / SINCRONIZADAS / SANDWICHES": "🥪",
  "TACOS CHICOS": "🌮",
  "TACOS GRANDES": "🌮",
  "HAMBURGUESAS SENCILLA": "🍔",
  "HAMBURGUESAS": "🍔",
  "HAMBURGUESAS COMBO": "🍔",
  "BURRITOS": "🌯",
  "FRAPPES": "🧋",
  "BEBIDAS": "🥤",
  "LICUADOS": "🥛",
  "JUGOS": "🍊",
  "OTROS": "🍟",
};

async function cargarMenu() {
  try {
    const res = await fetch(`${API}?sucursal=${SUCURSAL}`);
    const data = await res.json();
    config = data.config || {};
    renderMenu(data.menu || {});
    if (config.horario) document.getElementById("horario-badge").textContent = config.horario;
    if (config.telefono) window.WA_PHONE = config.telefono;
  } catch(e) {
    document.getElementById("loading").innerHTML = `<p style="color:#e53935;font-weight:700;">Error al cargar el menú. Intenta de nuevo.</p>`;
  }
}

function renderMenu(menu) {
  document.getElementById("loading").style.display = "none";
  const container = document.getElementById("menu");
  container.innerHTML = "";

  Object.entries(menu).forEach(([cat, items]) => {
    const block = document.createElement("div");
    block.className = "cat-block";
    const icon = CAT_ICONS[cat] || "🍽️";

    block.innerHTML = `
      <div class="cat-header" onclick="toggleCat(this)">
        <span class="cat-icon">${icon}</span>
        <span>${cat}</span>
        <span class="cat-arrow">▼</span>
      </div>
      <div class="cat-body open">
        ${items.map((item, i) => `
          <div class="item-row" draggable="true"
            data-nombre="${esc(item.nombre)}"
            data-precio="${item.precio}"
            data-cat="${esc(cat)}">
            <span class="drag-handle">⠿</span>
            <div style="flex:1">
              <div class="item-name">${item.nombre}</div>
              ${item.descripcion ? `<div class="item-desc">${item.descripcion}</div>` : ""}
            </div>
            <div class="item-precio">${item.precio > 0 ? "$" + item.precio : "—"}</div>
            <button class="btn-add" onclick="addToOrder('${esc(item.nombre)}', ${item.precio}, '${esc(cat)}', this)">+ Agregar</button>
          </div>
        `).join("")}
      </div>
    `;
    container.appendChild(block);
  });

  initDragMenu();
}

function esc(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, "&quot;"); }

function toggleCat(header) {
  header.classList.toggle("open");
  header.nextElementSibling.classList.toggle("open");
}

function addToOrder(nombre, precio, cat, btn) {
  const existing = orden.find(o => o.nombre === nombre);
  if (existing) {
    existing.qty++;
  } else {
    orden.push({ nombre, precio, qty: 1, cat });
  }
  btn.textContent = "✓ Añadido";
  btn.classList.add("added");
  setTimeout(() => { btn.textContent = "+ Agregar"; btn.classList.remove("added"); }, 900);
  updateCartBadge();
  renderOrderList();
}

function updateCartBadge() {
  const total = orden.reduce((s, o) => s + o.qty, 0);
  const fab = document.getElementById("cart-fab");
  document.getElementById("cart-badge").textContent = total;
  fab.style.display = total > 0 ? "flex" : "none";
}

function renderOrderList() {
  const ul = document.getElementById("order-list");
  if (orden.length === 0) {
    ul.innerHTML = `<div class="order-empty"><div>🛒</div>Tu pedido está vacío.<br/>Agrega productos del menú.</div>`;
    document.getElementById("order-total-val").textContent = "$0";
    return;
  }

  ul.innerHTML = orden.map((o, i) => `
    <li draggable="true" data-idx="${i}">
      <span class="order-drag">⠿</span>
      <span class="order-name">${o.nombre}</span>
      <div class="order-qty">
        <button class="qty-btn minus" onclick="changeQty(${i}, -1)">−</button>
        <span class="qty-num">${o.qty}</span>
        <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
      </div>
      <span class="order-precio">${o.precio > 0 ? "$" + (o.precio * o.qty) : "—"}</span>
      <button class="order-remove" onclick="removeItem(${i})">✕</button>
    </li>
  `).join("");

  const total = orden.reduce((s, o) => s + (o.precio > 0 ? o.precio * o.qty : 0), 0);
  document.getElementById("order-total-val").textContent = "$" + total;

  initDragOrder();
}

function changeQty(idx, delta) {
  orden[idx].qty += delta;
  if (orden[idx].qty <= 0) orden.splice(idx, 1);
  updateCartBadge();
  renderOrderList();
}

function removeItem(idx) {
  orden.splice(idx, 1);
  updateCartBadge();
  renderOrderList();
}

function openPanel() {
  renderOrderList();
  document.getElementById("order-panel").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}
function closePanel() {
  document.getElementById("order-panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function sendWhatsApp() {
  if (orden.length === 0) { alert("Agrega al menos un producto a tu pedido."); return; }
  const nota = document.getElementById("order-note").value.trim();
  let msg = "🌸 *Pedido – Lonchería Flor de Azalea (Matriz)*\n\n";
  orden.forEach((o, i) => {
    msg += `${i+1}. ${o.nombre} x${o.qty}`;
    if (o.precio > 0) msg += ` — $${o.precio * o.qty}`;
    msg += "\n";
  });
  const total = orden.reduce((s, o) => s + (o.precio > 0 ? o.precio * o.qty : 0), 0);
  if (total > 0) msg += `\n💰 *Total estimado: $${total}*`;
  if (nota) msg += `\n\n📝 Indicaciones: ${nota}`;
  const phone = window.WA_PHONE || config.telefono || "";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

function pedirCuenta() {
  const phone = window.WA_PHONE || config.telefono || "";
  const msg = "🧾 Hola, quisiera solicitar la cuenta / atención en Lonchería Flor de Azalea Matriz.";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

function dejarOpinion() {
  const phone = window.WA_PHONE || config.telefono || "";
  const msg = "⭐ Hola, quisiera dejar una opinión sobre mi visita a Lonchería Flor de Azalea Matriz.";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

function scrollTop() { window.scrollTo({ top: 0, behavior: "smooth" }); }

// DRAG & DROP — Menú (arrastrar item al pedido)
function initDragMenu() {
  document.querySelectorAll(".item-row").forEach(row => {
    row.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/plain", JSON.stringify({
        nombre: row.dataset.nombre,
        precio: parseFloat(row.dataset.precio),
        cat: row.dataset.cat
      }));
      row.classList.add("dragging");
    });
    row.addEventListener("dragend", () => row.classList.remove("dragging"));
  });

  const panel = document.getElementById("order-panel");
  panel.addEventListener("dragover", e => { e.preventDefault(); });
  panel.addEventListener("drop", e => {
    e.preventDefault();
    try {
      const d = JSON.parse(e.dataTransfer.getData("text/plain"));
      addToOrderDirect(d.nombre, d.precio, d.cat);
      if (!document.getElementById("order-panel").classList.contains("open")) openPanel();
    } catch(err) {}
  });
}

function addToOrderDirect(nombre, precio, cat) {
  const existing = orden.find(o => o.nombre === nombre);
  if (existing) existing.qty++;
  else orden.push({ nombre, precio, qty: 1, cat });
  updateCartBadge();
  renderOrderList();
}

// DRAG & DROP — Reordenar lista de pedido
function initDragOrder() {
  const items = document.querySelectorAll("#order-list li");
  let dragSrc = null;
  items.forEach(li => {
    li.addEventListener("dragstart", () => { dragSrc = li; li.classList.add("dragging"); });
    li.addEventListener("dragend", () => li.classList.remove("dragging"));
    li.addEventListener("dragover", e => { e.preventDefault(); li.classList.add("drag-over"); });
    li.addEventListener("dragleave", () => li.classList.remove("drag-over"));
    li.addEventListener("drop", e => {
      e.preventDefault();
      li.classList.remove("drag-over");
      if (dragSrc && dragSrc !== li) {
        const fromIdx = parseInt(dragSrc.dataset.idx);
        const toIdx = parseInt(li.dataset.idx);
        const item = orden.splice(fromIdx, 1)[0];
        orden.splice(toIdx, 0, item);
        renderOrderList();
      }
    });
  });
}

cargarMenu();
</script>
</body>
</html>
